[package]
name = "umbr-ui"
version = "0.1.0"
edition = "2024"

[dependencies]
gtk4 = "0.10.1"
gdk4 = "0.10.1"
gsk4 = "0.10.1"
glib = "0.21.2"
graphene-rs = "0.21.2"

# gtk4-layer-shell = "0.6.3"
uheex = { path = "../uheex", default-features = false }

# Wayland
wayland-client = "0.31.11"
wayland-egl = "0.32.8"
wayland-protocols = { version = "0.32.9", features = ["client", "staging"] }

memmap2 = "0.9"
tempfile = "3.10"

cairo-rs = "0.21.2"
pango = "0.21.2"
pangocairo = "0.21.2"

[dependencies.smithay-client-toolkit]
version = "0.19.2"
default-features = false
features = ["xkbcommon"]